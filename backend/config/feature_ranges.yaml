# MVP min-max normalization ranges.
# normalized = clip((value - min) / (max - min), 0, 1)
# risk_direction controls how the risk engine converts a normalized value to risk:
#   high: higher value means higher risk
#   low: lower value means higher risk
#   mid: outside the ideal interval means higher risk

sleep_duration_h:
  min: 0
  max: 10
  risk_direction: mid
  ideal_min: 7
  ideal_max: 9
  group: sleep_fatigue

sleep_efficiency:
  min: 0
  max: 1
  risk_direction: low
  group: sleep_fatigue

